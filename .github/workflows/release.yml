name: release-binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: darwin-arm64
            bun_target: bun-darwin-arm64
            allow_failure: false
          - os: macos-13
            arch: darwin-x64
            bun_target: bun-darwin-x64
            allow_failure: true
          - os: ubuntu-24.04-arm
            arch: linux-arm64
            bun_target: bun-linux-arm64
            allow_failure: false
          - os: ubuntu-22.04
            arch: linux-x64
            bun_target: bun-linux-x64
            allow_failure: false

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: bun build --compile --target=${{ matrix.bun_target }} src/cli/index.ts --outfile dist/proteus

      - name: Smoke test binary
        run: ./dist/proteus --help

      - name: Package binary and checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FILE="proteus-v${VERSION}-${{ matrix.arch }}.tar.gz"
          SHA_FILE="${FILE%.tar.gz}.sha256"

          tar -czf "$FILE" -C dist proteus
          shasum -a 256 "$FILE" > "$SHA_FILE"

          echo "FILE=$FILE" >> "$GITHUB_ENV"
          echo "SHA_FILE=$SHA_FILE" >> "$GITHUB_ENV"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.FILE }}
            ${{ env.SHA_FILE }}

  sync-formula:
    needs: build-and-release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fetch release checksums
        id: checksums
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p checksums

          required=(
            "proteus-v${VERSION}-darwin-arm64.sha256"
            "proteus-v${VERSION}-linux-arm64.sha256"
            "proteus-v${VERSION}-linux-x64.sha256"
          )

          for attempt in 1 2 3 4 5 6; do
            rm -f checksums/*.sha256 || true
            gh release download "$TAG" --repo "$REPO" --pattern "proteus-v${VERSION}-*.sha256" --dir checksums || true

            missing=0
            for name in "${required[@]}"; do
              if [ ! -f "checksums/${name}" ]; then
                missing=1
                break
              fi
            done

            if [ "$missing" -eq 0 ]; then
              break
            fi

            if [ "$attempt" -eq 6 ]; then
              echo "Release assets are incomplete for $TAG"
              ls -la checksums || true
              exit 1
            fi

            sleep 15
          done

          fetch_sha() {
            local arch="$1"
            local file="checksums/proteus-v${VERSION}-${arch}.sha256"
            local sum

            if [ ! -f "$file" ]; then
              echo "Missing checksum file: $file"
              exit 1
            fi

            sum="$(awk '{print $1}' "$file")"
            if [ -z "$sum" ]; then
              echo "Empty checksum for ${arch}"
              exit 1
            fi

            case "$sum" in
              [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]* ) ;;
              * )
                echo "Invalid checksum for ${arch}: $sum"
                exit 1
                ;;
            esac

            echo "$sum"
          }

          fetch_optional_sha() {
            local arch="$1"
            local file="checksums/proteus-v${VERSION}-${arch}.sha256"

            if [ ! -f "$file" ]; then
              echo ""
              return 0
            fi

            local sum
            sum="$(awk '{print $1}' "$file")"
            if [ -z "$sum" ]; then
              echo ""
              return 0
            fi

            case "$sum" in
              [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]* ) echo "$sum" ;;
              * ) echo "" ;;
            esac
          }

          DARWIN_ARM64="$(fetch_sha darwin-arm64)"
          DARWIN_X64="$(fetch_optional_sha darwin-x64)"
          LINUX_ARM64="$(fetch_sha linux-arm64)"
          LINUX_X64="$(fetch_sha linux-x64)"

          echo "darwin_arm64=$DARWIN_ARM64" >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$DARWIN_X64" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$LINUX_ARM64" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$LINUX_X64" >> "$GITHUB_OUTPUT"

      - name: Update Formula/proteus.rb
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
          DARWIN_ARM64_SHA: ${{ steps.checksums.outputs.darwin_arm64 }}
          DARWIN_X64_SHA: ${{ steps.checksums.outputs.darwin_x64 }}
          LINUX_ARM64_SHA: ${{ steps.checksums.outputs.linux_arm64 }}
          LINUX_X64_SHA: ${{ steps.checksums.outputs.linux_x64 }}
        run: |
          set -euo pipefail

          {
            echo 'class Proteus < Formula'
            echo '  desc "Switch providers, models, and config profiles for AI developer tools"'
            echo "  homepage \"https://github.com/${REPO}\""
            echo "  version \"${VERSION}\""
            echo
            echo '  on_macos do'
            echo '    if Hardware::CPU.arm?'
            echo "      url \"https://github.com/${REPO}/releases/download/${TAG}/proteus-v${VERSION}-darwin-arm64.tar.gz\""
            echo "      sha256 \"${DARWIN_ARM64_SHA}\""
            if [ -n "${DARWIN_X64_SHA}" ]; then
              echo '    else'
              echo "      url \"https://github.com/${REPO}/releases/download/${TAG}/proteus-v${VERSION}-darwin-x64.tar.gz\""
              echo "      sha256 \"${DARWIN_X64_SHA}\""
            else
              echo '    else'
              echo '      odie "No darwin-x64 release asset is available for this version."'
            fi
            echo '    end'
            echo '  end'
            echo
            echo '  on_linux do'
            echo '    if Hardware::CPU.arm?'
            echo "      url \"https://github.com/${REPO}/releases/download/${TAG}/proteus-v${VERSION}-linux-arm64.tar.gz\""
            echo "      sha256 \"${LINUX_ARM64_SHA}\""
            echo '    else'
            echo "      url \"https://github.com/${REPO}/releases/download/${TAG}/proteus-v${VERSION}-linux-x64.tar.gz\""
            echo "      sha256 \"${LINUX_X64_SHA}\""
            echo '    end'
            echo '  end'
            echo
            echo '  def install'
            echo '    bin.install "proteus"'
            echo '  end'
            echo
            echo '  test do'
            echo '    assert_match "proteus", shell_output("#{bin}/proteus --help")'
            echo '  end'
            echo 'end'
          } > Formula/proteus.rb

      - name: Commit and push Formula update
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          if git diff --quiet -- Formula/proteus.rb; then
            echo "Formula already up-to-date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/proteus.rb
          git commit -m "chore(homebrew): update formula to v${VERSION}"
          git push origin HEAD:main
