name: release-binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: darwin-arm64
            bun_target: bun-darwin-arm64
          - os: ubuntu-24.04-arm
            arch: linux-arm64
            bun_target: bun-linux-arm64
          - os: ubuntu-22.04
            arch: linux-x64
            bun_target: bun-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: bun build --compile --target=${{ matrix.bun_target }} src/cli/index.ts --outfile dist/proteus

      - name: Smoke test binary
        run: ./dist/proteus --help

      - name: Package binary and checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FILE="proteus-v${VERSION}-${{ matrix.arch }}.tar.gz"
          SHA_FILE="${FILE%.tar.gz}.sha256"

          tar -czf "$FILE" -C dist proteus
          shasum -a 256 "$FILE" > "$SHA_FILE"

          echo "FILE=$FILE" >> "$GITHUB_ENV"
          echo "SHA_FILE=$SHA_FILE" >> "$GITHUB_ENV"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.FILE }}
            ${{ env.SHA_FILE }}

  sync-formula:
    needs: build-and-release
    uses: ./.github/workflows/update-homebrew-formula.yml
    with:
      tag: ${{ github.ref_name }}
